<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crucigrama · Juegos y pasatiempos · El Confidencial</title>
  <meta name="description" content="Juega al crucigrama diario de El Confidencial." />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
<div class="layout">

  <!-- ==============================
       HEADER
       ============================== -->
  <header class="site-header">
    <div class="container site-header__inner">
      <a class="site-header__logo" href="/" aria-label="El Confidencial">ElConfidencial</a>
    </div>
  </header>

  <!-- ==============================
       MAIN
       ============================== -->
  <main class="main">
    <div class="container">

      <!-- BANNER PUBLICIDAD (billboard) -->
      <aside class="ad" aria-label="Publicidad">
        <div class="ad__slot ad__slot--billboard" data-ad-slot="billboard">
          <!-- Ad slot del gestor publicitario -->
        </div>
        <div class="ad__label">Publicidad</div>
      </aside>

      <!-- ZONA JUEGO + ASIDE PUBLICIDAD -->
      <div class="main__row">

        <!-- COLUMNA IZQUIERDA · BALCÓN + SLOT DE JUEGO -->
        <section aria-labelledby="game-title">

          <!-- Balcón de sección + metadatos (B1) -->
          <header class="game-balcony">
            <div class="game-balcony__row">
              <h1 id="game-title" class="game-balcony__title">Crucigrama</h1>
              <span class="game-balcony__meta">
                <strong>Nº 1.247</strong>
                <span>·</span>
                <span>27 de mayo de 2026</span>
              </span>
            </div>
            <div class="game-balcony__stats">
              <span class="game-balcony__stat">⏱ <strong>8'12"</strong> de media</span>
              <span class="game-balcony__stat">✓ <strong>78%</strong> lo terminan</span>
              <span class="game-balcony__stat">🔥 <strong>3.241</strong> jugadores hoy</span>
            </div>
          </header>

          <!-- SLOT DEL JUEGO
               Aquí encaja el juego real:
               - <iframe> al motor de juego (Amuse, Cloudkid, in-house, etc.)
               - O un componente React/Vue montado en este div
               - O un canvas HTML5

               La clase .game-slot solo aporta:
                · Fondo Neutral/100 (#e2e2e2)
                · Radio 8px
                · Aspect-ratio 4:5 (revisable según juego)
                · Min-height 600px en desktop -->
          <div class="game-slot" aria-label="Área de juego" data-game-id="crucigrama">
            [ Aquí encaja el juego ]
          </div>

        </section>

        <!-- ASIDE PUBLICIDAD SIDEBAR -->
        <aside class="main__aside" aria-label="Publicidad lateral">
          <div class="ad">
            <div class="ad__slot ad__slot--sidebar" data-ad-slot="sidebar">
              <!-- Ad slot lateral -->
            </div>
            <div class="ad__label">Publicidad</div>
          </div>
        </aside>

      </div>

    </div>
  </main>

  <!-- ==============================
       FOOTER
       ============================== -->
  <footer class="site-footer">Footer</footer>


  <!-- ==============================
       B3 + C2 · MODAL POST-PARTIDA
       Se muestra al terminar el juego. En producción, abrir con JS cuando
       el motor del juego emita el evento `game:completed`.
       Para el handoff lo dejamos visible por defecto — añadir
       `hidden` al modal raíz cuando se integre con el motor real.
       ============================== -->
  <div class="post-modal" id="post-modal" role="dialog" aria-modal="true" aria-labelledby="post-modal-title">
    <div class="post-modal__panel">

      <button class="post-modal__close" type="button" aria-label="Cerrar"
              onclick="document.getElementById('post-modal').setAttribute('hidden','')">×</button>

      <header class="post-modal__head">
        <div class="post-modal__eyebrow">¡Resuelto!</div>
        <h2 id="post-modal-title" class="post-modal__title">Crucigrama del miércoles</h2>
      </header>

      <!-- Compartible sin spoiler. El template de cuadraditos lo genera el motor. -->
      <div class="post-modal__share">
        <div class="post-modal__grid" aria-label="Resultado para compartir">🟩🟩⬜🟩🟩<br>⬜🟩⬜🟩⬜<br>🟩🟩🟩🟩🟩</div>
        <button class="btn btn--dark" type="button"
                onclick="navigator.clipboard.writeText('🟩🟩⬜🟩🟩\n⬜🟩⬜🟩⬜\n🟩🟩🟩🟩🟩\n\nEC Crucigrama #1247 · 12&#39;34&quot;\nelconfidencial.com/juegos').then(()=>{this.textContent='Copiado ✓'})">
          Copiar resultado
        </button>
      </div>

      <div class="post-modal__stats">
        <div class="post-modal__stat">
          <span class="post-modal__stat-num">12'34"</span>
          <span class="post-modal__stat-label">Tu tiempo</span>
        </div>
        <div class="post-modal__stat">
          <span class="post-modal__stat-num">8'12"</span>
          <span class="post-modal__stat-label">Media</span>
        </div>
        <div class="post-modal__stat">
          <span class="post-modal__stat-num">13</span>
          <span class="post-modal__stat-label">Días de racha</span>
        </div>
      </div>

      <footer class="post-modal__actions">
        <a class="btn btn--dark" href="./game.html?juego=sudoku">Probar el Sudoku de hoy</a>
        <button class="btn" type="button"
                onclick="document.getElementById('post-modal').setAttribute('hidden','')">Volver mañana</button>
      </footer>

    </div>
  </div>

</div>
</body>
</html>
